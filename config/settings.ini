# ==============================================
# CONFIGURATION FILE - FriendlyDNSReporter
# ==============================================

[GENERAL]
# --- GLOBAL BEHAVIOR ---
TIMEOUT = 1
SLEEP = 0.01
MAX_THREADS = 20
# Filters servers to only those mentioned in domains.csv
ONLY_TEST_ACTIVE_GROUPS = true
ENABLE_UI_LEGENDS = true

[REPORTS]
# --- RESULTS & LOGS ---
LOG_DIR = infos
FILE_DOMAINS = domains.csv
FILE_GROUPS = groups.csv
ENABLE_HTML_REPORT = true
ENABLE_JSON_REPORT = true
ENABLE_CSV_REPORT = true
ENABLE_REPORT_TIMESTAMPS = false
ENABLE_EXECUTION_LOG = true
ENABLE_PRIVACY_SCORE = true
ENABLE_SECURITY_SCORE = true

[DNS_ENGINE]
# --- ENGINE TUNING ---
DNS_TIMEOUT = 1
DNS_RETRIES = 1

[PHASES]
# --- PHASE SELECTION (SCOPE) ---
ENABLE_PHASE_SERVER = true
ENABLE_PHASE_ZONE = true
ENABLE_PHASE_RECORD = true

[CONNECTIVITY]
# --- SERVER TESTS (PHASE 1) ---
ENABLE_PING = true
PING_COUNT = 10
PING_TIMEOUT = 1
# SLAs MÁXIMOS PERMITIDOS ANTES DE ALERTAS
PING_LATENCY_WARN = 100
PING_LATENCY_CRIT = 500
PING_LOSS_WARN = 1
PING_LOSS_CRIT = 33

# Phase 2: SOA Query SLA
SOA_LATENCY_WARN = 100
SOA_LATENCY_CRIT = 500

[ADVANCED_CHECKS]
# --- INFRASTRUCTURE CAPABILITIES ---
CHECK_BIND_VERSION = true
ENABLE_RECURSION_CHECK = true
ENABLE_DNSSEC_CHECK = true
ENABLE_EDNS_CHECK = true
ENABLE_DOT_CHECK = true
ENABLE_DOH_CHECK = true
ENABLE_ECS_CHECK = true
ENABLE_QNAME_MIN_CHECK = true
ENABLE_DNS_COOKIES_CHECK = true
ENABLE_DNSSEC_CHAIN_VAL = false

[ZONE_TESTS]
# --- ZONE TESTS (PHASE 2) ---
ENABLE_AXFR_CHECK = true
ENABLE_SOA_TIMER_AUDIT = true
ENABLE_ZONE_DNSSEC_CHECK = true
# Groups where zone transfers (AXFR) are expected/allowed (e.g., SECONDARIES,SLAVES)
AXFR_ALLOWED_GROUPS = 
ENABLE_WEB_RISK_CHECK = true
ENABLE_CAA_CHECK = true

[CONSISTENCY]
# --- RECORD TESTS (PHASE 3) ---
CONSISTENCY_CHECKS = 2
# Divergence Criteria (Tolerance)
STRICT_IP_CHECK = false
STRICT_ORDER_CHECK = false
STRICT_TTL_CHECK = false
# Query Latency Thresholds (DNS Consistency)
REC_LATENCY_WARN = 100
REC_LATENCY_CRIT = 500
