# ==============================================
# CONFIGURATION FILE - FriendlyDNSReporter
# ==============================================

[GENERAL]
# --- GLOBAL BEHAVIOR ---
TIMEOUT = 3
VALIDATE_CONNECTIVITY = true
SLEEP = 0.1
ONLY_TEST_ACTIVE_GROUPS = true
INTERACTIVE_MODE = true
COLOR_OUTPUT = true
MAX_THREADS = 10
# Verbosity Level: 0=Quiet, 1=Summary, 2=Verbose, 3=Debug
VERBOSE_LEVEL = 2

[REPORTS]
# --- RESULTS & LOGS ---
LOG_PREFIX = FriendlyDNSReporter
LOG_DIR = logs
FILE_DOMAINS = domains.csv
FILE_GROUPS = groups.csv
ENABLE_HTML_REPORT = true
ENABLE_JSON_REPORT = true
ENABLE_CSV_REPORT = true
ENABLE_FULL_REPORT = true
ENABLE_SIMPLE_REPORT = false
HTML_REPORT_LANG = en
ENABLE_LOG_TEXT = true
ENABLE_CHARTS = true

[DIG_OPTIONS]
# --- DIG OPTIONS (Maintained for legacy compatibility) ---
DIG_TIMEOUT = 1
DIG_TRIES = 1
DEFAULT_DIG_OPTIONS = +norecurse +tries=${DIG_TRIES} +time=${DIG_TIMEOUT} +nocookie +cd +bufsize=1232 +nsid
RECURSIVE_DIG_OPTIONS = +tries=${DIG_TRIES} +time=${DIG_TIMEOUT} +nocookie +cd +bufsize=1232 +nsid

[PHASES]
# --- PHASE SELECTION (SCOPE) ---
ENABLE_PHASE_SERVER = true
ENABLE_PHASE_ZONE = true
ENABLE_PHASE_RECORD = true

[CONNECTIVITY]
# --- SERVER TESTS (PHASE 1) ---
ENABLE_PING = true
ENABLE_IPV6 = false
PING_COUNT = 3
PING_TIMEOUT = 2
PING_PACKET_LOSS_LIMIT = 5
# SLAs MÁXIMOS PERMITIDOS ANTES DE ALERTAS
PING_LATENCY_WARN = 100
PING_LATENCY_CRIT = 500
PING_LOSS_WARN = 1
PING_LOSS_CRIT = 33

# Phase 2: SOA Query SLA
SOA_LATENCY_WARN = 500
SOA_LATENCY_CRIT = 1500
ENABLE_TRACE = false
TRACE_MAX_HOPS = 15
ENABLE_TCP_CHECK = true

[ADVANCED_CHECKS]
# --- ATTRIBUTES AND VERSION ---
CHECK_BIND_VERSION = true
ENABLE_RECURSION_CHECK = true
# Modern Features & Security Capabilities
ENABLE_DNSSEC_CHECK = true
ENABLE_EDNS_CHECK = true
ENABLE_COOKIE_CHECK = true
ENABLE_QNAME_CHECK = true
ENABLE_TLS_CHECK = true
ENABLE_DOT_CHECK = true
ENABLE_DOH_CHECK = true

[ZONE_TESTS]
# --- ZONE TESTS (PHASE 2) ---
ENABLE_AXFR_CHECK = true
ENABLE_SOA_SERIAL_CHECK = true
# Groups where zone transfers (AXFR) are expected/allowed (e.g., SECONDARIES,SLAVES)
# Comma-separated list of group names.
AXFR_ALLOWED_GROUPS = 

[CONSISTENCY]
# --- RECORD TESTS (PHASE 3) ---
CONSISTENCY_CHECKS = 2
# Divergence Criteria (Tolerance)
# true = Strict (Any difference counts)
# false = Permissive (Ignore differences in this field)
STRICT_IP_CHECK = false
STRICT_ORDER_CHECK = false
STRICT_TTL_CHECK = false
# Query Latency Thresholds (DNS)
DNS_LATENCY_WARNING_THRESHOLD = 150
DNS_LATENCY_MIN_THRESHOLD = 5
