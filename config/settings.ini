# =============================================================================
# FriendlyDNSReporter CONFIGURATION FILE
# =============================================================================
# This file centralizes all operational, reporting, and scoring parameters.
# Boolean values: true | false. Time values: seconds (unless specified).
# Latency values: milliseconds (unless specified).
# =============================================================================

[GENERAL]
# --- GLOBAL BEHAVIOR ---

# Default network timeout for generic operations (socket connection, ICMP etc.).
# Values: 1 to 10 (seconds). Recommended: 1 (fast networks) to 3 (unstable).
TIMEOUT = 1

# Delay between repeated queries to the same server in Phase 3.
# Purpose: Prevents rate-limiting and reduces artificial load on the target.
# Values: 0.0 to 1.0 (seconds). Recommended: 0.01.
SLEEP = 0.01

# Maximum number of concurrent workers (threads).
# Purpose: Controls parallelism level. Higher values speed up large datasets but use more CPU/RAM.
# Values: 1 to 100. Recommended: 20 (standard) to 50 (performance).
MAX_THREADS = 20

# Interval for the watchdog progress tracker to refresh the terminal status line.
# Values: 0.5 to 10.0 (seconds). Recommended: 2.0.
WATCHDOG_INTERVAL = 2.0

# Time to wait for background threads to stop gracefully during script exit.
# Values: 0.1 to 2.0 (seconds). Recommended: 0.1.
WATCHDOG_JOIN_TIMEOUT = 0.1

# If true, only servers belonging to groups referenced in domains.csv will be scanned.
# If false, all servers defined in groups.csv are scanned regardless of active usage.
# Values: true | false.
ONLY_TEST_ACTIVE_GROUPS = true

# Displays a visual legend at the end of each phase explaining the symbols (OK, DIV!, LAME, etc.).
# Values: true | false.
ENABLE_UI_LEGENDS = false

# Absolute or relative path to the domains dataset.
# Values: Filename string. Default: config/domains.csv
FILE_DOMAINS = config/domains.csv

# Absolute or relative path to the server groups configuration.
# Values: Filename string. Default: config/groups.csv
FILE_GROUPS = config/groups.csv

[REPORTS]
# --- RESULTS & LOGS ---

# Directory name for saving output reports and logs.
# Values: Directory path string. Default: infos
LOG_DIR = infos

# Toggles generation of the interactive Forensic Dashboard (HTML).
# Values: true | false.
ENABLE_HTML_REPORT = true

# Toggles generation of the raw machine-readable data report (JSON).
# Values: true | false.
ENABLE_JSON_REPORT = false

# Toggles generation of phase detail tables in spreadsheet format (CSV).
# Values: true | false.
ENABLE_CSV_REPORT = false

# Toggles generation of the plain-text human-readable executive summary (TXT).
# Values: true | false.
ENABLE_TEXT_REPORT = false

# Appends YYYYMMDD_HHMMSS timestamp to filenames to prevent overwriting previous runs.
# Values: true | false. Recommended: true.
ENABLE_REPORT_TIMESTAMPS = true

# Enables low-level logging of every query and response to a .log file.
# Values: true | false. Recommended: false (slows down execution).
ENABLE_EXECUTION_LOG = false

# Toggles calculation and display of the Privacy Score in UI and reports.
# Values: true | false.
ENABLE_PRIVACY_SCORE = true

# Toggles calculation and display of the Security Score in UI and reports.
# Values: true | false.
ENABLE_SECURITY_SCORE = true

[DNS_ENGINE]
# --- ENGINE TUNING ---

# Timeout for individual DNS message exchanges.
# Values: 1 to 5 (seconds). Recommended: 1.
DNS_TIMEOUT = 1

# Number of times to retry a DNS query if no response is received.
# Values: 0 to 5. Recommended: 1.
DNS_RETRIES = 1

# If true, validates the SSL certificate chain and hostname for DoH servers.
# If false, ignores SSL errors (risk of MITM).
# Values: true (Secure) | false (Insecure).
DOH_VERIFY_SSL = true

# The HTTP resource path for DNS queries on the DoH server.
# Values: URL path string. Common: /dns-query
DOH_URL_PATH = /dns-query

# The domain used for basic UDP/TCP 53 liveness and RCODE probes.
# Values: Any valid hostname. Default: google.com
DEFAULT_QUERY_DOMAIN = google.com

# Target used specifically for root-level DNSSEC signature/chain validation.
# Values: "." (root) or a specific signed domain.
DNSSEC_ROOT_TARGET = .

[PHASES]
# --- PHASE SELECTION ---

# Phase 1: Infrastructure and encryption (DoT, DoH, Ping, Ports).
# Values: true | false.
ENABLE_PHASE_SERVER = true

# Phase 2: Zone integrity and provisioning (SOA, AXFR, CAA).
# Values: true | false.
ENABLE_PHASE_ZONE = true

# Phase 3: Record consistency and semantic analysis (A, MX, SPF, etc.).
# Values: true | false.
ENABLE_PHASE_RECORD = true

[CONNECTIVITY]
# --- PERFORMANCE & SLA ---

# Enables ICMP Ping to detect raw RTT and availability.
# Values: true | false.
ENABLE_PING = true

# Number of ICMP Echo Requests sent per server to calculate jitter and loss.
# Values: 1 to 20. Recommended: 10.
PING_COUNT = 10

# Network timeout for individual ICMP packets.
# Values: 0.5 to 3.0 (seconds). Recommended: 1.
PING_TIMEOUT = 1

# Rounds of repeated service probes in Phase 1 to detect stability issues.
# Values: 1 to 5. Recommended: 2.
PHASE1_PROBE_REPEATS = 2

# Rounds of repeated SOA retrieval in Phase 2 to ensure data synchronization.
# Values: 1 to 5. Recommended: 2.
PHASE2_PROBE_REPEATS = 2

# Latency threshold (ms) for network-level WARNING status.
# Values: 10 to 1000. Recommended: 100.
PING_LATENCY_WARN = 100

# Latency threshold (ms) for network-level CRITICAL failure.
# Values: 20 to 2000. Recommended: 500.
PING_LATENCY_CRIT = 500

# Packet Loss (%) threshold for network-level WARNING.
# Values: 0 to 100. Recommended: 1.
PING_LOSS_WARN = 1

# Packet Loss (%) threshold for network-level CRITICAL.
# Values: 5 to 100. Recommended: 33.
PING_LOSS_CRIT = 33

# Latency threshold (ms) for SOA retrieval WARNING.
# Values: 20 to 1000. Recommended: 100.
SOA_LATENCY_WARN = 100

# Latency threshold (ms) for SOA retrieval CRITICAL.
# Values: 50 to 2000. Recommended: 500.
SOA_LATENCY_CRIT = 500

[ADVANCED_CHECKS]
# --- CAPABILITIES AUDIT ---

# Attempts to fetch Bind Version (version.bind) to identify server software.
# Values: true | false.
CHECK_BIND_VERSION = true

# Checks if the server allows generic recursion to non-authoritative domains.
# Values: true | false.
ENABLE_RECURSION_CHECK = true

# Verifies if the server provides DNSSEC flags and signed data.
# Values: true | false.
ENABLE_DNSSEC_CHECK = true

# Probes for EDNS0 support (extended packet sizes).
# Values: true | false.
ENABLE_EDNS_CHECK = true

# Probes for DNS-over-TLS existence on port 853.
# Values: true | false.
ENABLE_DOT_CHECK = true

# Probes for DNS-over-HTTPS existence on port 443.
# Values: true | false.
ENABLE_DOH_CHECK = true

# Checks if the server supports EDNS Client Subnet (Privacy exposure).
# Values: true | false.
ENABLE_ECS_CHECK = true

# Checks if the server performs QNAME Minimization to protect upstream privacy.
# Values: true | false.
ENABLE_QNAME_MIN_CHECK = true

# Probes for DNS Cookies support (DDoS protection).
# Values: true | false.
ENABLE_DNS_COOKIES_CHECK = true

[ZONE_TESTS]
# --- DATA INTEGRITY ---

# Attempts an AXFR (Zone Transfer) to check for data exposure vulnerabilities.
# Values: true | false.
ENABLE_AXFR_CHECK = true

# Audits SOA Refresh/Retry/Expire timers against RFC 1912 best practices.
# Values: true | false.
ENABLE_SOA_TIMER_AUDIT = true

# Checks if individual zone records are signed (NSEC/NSEC3 presence).
# Values: true | false.
ENABLE_ZONE_DNSSEC_CHECK = true

# Comma-separated list of group names where AXFR is EXPECTED/ALLOWED.
# If AXFR succeeds on a group NOT in this list, it is marked as a critical Vulnerability (XFR-OK).
# Values: Group labels (e.g. SECONDARIES,INTERNAL). Empty = AXFR never allowed.
AXFR_ALLOWED_GROUPS = 

# Scans ports 80/443 on the DNS server to check for non-DNS service exposure.
# Values: true | false.
ENABLE_WEB_RISK_CHECK = true

# Fetches CAA (Certificate Authority Authorization) records to verify issuance policy.
# Values: true | false.
ENABLE_CAA_CHECK = true

# The port used for testing MX server reachability (SMTP).
# Values: Common 25, 465, 587. Default: 25.
SMTP_PORT = 25

[SCORING_WEIGHTS]
# --- FORENSIC SCORING ---
# Weights determine the point contribution (0-100) for security and privacy grades.

# Point contribution for having DNSSEC active on infrastructure.
WEIGHT_DNSSEC = 20
# Point contribution for supporting DNS Cookies.
WEIGHT_COOKIES = 15
# Point contribution for supporting EDNS0.
WEIGHT_EDNS0 = 15
# Point contribution for restricting recursion (Open Resolver check).
WEIGHT_RESTRICTED = 15
# Point contribution for not running a web server on the same IP.
WEIGHT_WEB_SAFE = 15
# Contribution for UDP 53 port being open.
WEIGHT_PORT53_U = 10
# Contribution for TCP 53 port being open.
WEIGHT_PORT53_T = 10

# Privacy weighing (Calculated ONLY for recursive-profile servers)
WEIGHT_DOT = 25
WEIGHT_DOH = 25
WEIGHT_QNAME_MIN = 25
WEIGHT_ECS_MASKING = 25

# Zone Scoring contribution
WEIGHT_ZONE_SYNC = 30
WEIGHT_ZONE_AA = 20
WEIGHT_ZONE_NO_AXFR = 20
WEIGHT_ZONE_CAA = 15
WEIGHT_ZONE_DNSSEC = 15

[AUDIT_THRESHOLD]
# --- HEURISTIC LIMITS ---

# Minimum acceptable TTL (seconds). Values below this trigger a 'Too Low' warning.
# Recommended: 60 to 300.
TTL_MIN_THRESHOLD = 60

# Maximum acceptable TTL (seconds). Values above this trigger a 'Slow Migration' warning.
# Recommended: 86400 (24h) to 172800 (48h).
TTL_MAX_THRESHOLD = 172800

# Maximum number of DNS-resolution mechanisms allowed in SPF before a warning (RFC 7208 limit is 10).
# Recommended: 10.
SPF_LOOKUP_LIMIT = 10

[CONSISTENCY]
# --- RECORD ANALYSIS ---

# Number of times to repeat Phase 3 record checks to detect unstable/divergent data.
# Values: 1 to 10. Recommended: 2 (fast) to 10 (high precision).
CONSISTENCY_CHECKS = 2

# Comparison logic: if true, a change in the sorted IP list counts as a divergence (DIV!).
# Values: true | false. Recommended: false (CDNs often rotate IP orders).
STRICT_IP_CHECK = false

# Comparison logic: if true, any change in RDATA order (e.g. TXT list order) counts as DIV!.
# Values: true | false.
STRICT_ORDER_CHECK = false

# Comparison logic: if true, any change in TTL between queries counts as DIV!.
# Values: true | false.
STRICT_TTL_CHECK = false

# Latency threshold (ms) for individual record queries WARNING.
# Values: 50 to 500. Recommended: 100.
REC_LATENCY_WARN = 100

# Latency threshold (ms) for individual record queries CRITICAL.
# Values: 200 to 2000. Recommended: 500.
REC_LATENCY_CRIT = 500
