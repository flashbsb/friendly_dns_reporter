# =============================================================================
# FriendlyDNSReporter CONFIGURATION FILE
# =============================================================================

[GENERAL]
# --- GLOBAL BEHAVIOR ---

# Default network timeout for generic operations (seconds). 
# Recommended: 1 (fast networks) to 4 (unstable connections)
TIMEOUT = 1

# Delay between repeated hits on the same server during consistency checks (seconds).
# Prevents rate-limiting and reduces load on the target.
# Recommended: 0.01 (normal) to 0.1 (aggressive firewalls)
SLEEP = 0.01

# Maximum number of concurrent threads/workers.
# Affects how many servers/domains are tested simultaneously.
# Recommended: 10 (low spec) to 50 (high performance)
MAX_THREADS = 20

# Progress reporting: interval between watchdog status refreshes (seconds).
# Recommended: 1.0 to 5.0
WATCHDOG_INTERVAL = 2.0

# Grace period for background worker threads to terminate gracefully (seconds).
# Recommended: 0.1 to 1.0
WATCHDOG_JOIN_TIMEOUT = 0.1

# If true, the script ignores servers in groups.csv that are not referenced in domains.csv.
# Values: true | false
ONLY_TEST_ACTIVE_GROUPS = true

# Displays a detailed legend after each phase to explain UI symbols and status codes.
# Values: true | false
ENABLE_UI_LEGENDS = true

# Default file path for the list of domains to be tested.
FILE_DOMAINS = domains.csv

# Default file path for the server groups configuration.
FILE_GROUPS = groups.csv

[REPORTS]
# --- RESULTS & LOGS ---

# Directory where reports and diagnostic logs will be stored.
LOG_DIR = infos

# Generates a visual, interactive dashboard in HTML format.
# Values: true | false
ENABLE_HTML_REPORT = true

# Generates a raw data report in JSON format for external analysis.
# Values: true | false
ENABLE_JSON_REPORT = false

# Generates detailed data tables in CSV format for spreadsheets.
# Values: true | false
ENABLE_CSV_REPORT = false

# Generates a simplified, human-readable summary in TXT format.
# Values: true | false
ENABLE_TEXT_REPORT = false

# Appends current date/time to generated report filenames (e.g., report_20240324.json).
# Values: true | false
ENABLE_REPORT_TIMESTAMPS = true

# Records low-level execution logic and query history to a text log file.
# Values: true | false
ENABLE_EXECUTION_LOG = false

# Calculates and displays the Privacy Score based on protocol masking features.
# Values: true | false
ENABLE_PRIVACY_SCORE = true

# Calculates and displays the Security Score based on encryption and vulnerabilities.
# Values: true | false
ENABLE_SECURITY_SCORE = true

[DNS_ENGINE]
# --- ENGINE TUNING ---

# Timeout for individual DNS queries (seconds). Keep low to avoid massive stalls.
# Recommended: 1 to 2
DNS_TIMEOUT = 1

# Number of times to retry a failed DNS query before marking it as TIMEOUT.
# Recommended: 1 (fast audits) to 3 (unreliable networks)
DNS_RETRIES = 1

# Enables verification of SSL/TLS certificates for DNS-over-HTTPS (DoH) probes.
# Values: true (Secure) | false (Insecure, bypasses cert errors)
DOH_VERIFY_SSL = true

# The default path provided by the DoH server for queries.
# Common: /dns-query
DOH_URL_PATH = /dns-query

# Generic domain used for basic service responsiveness probes (UDP/TCP 53).
DEFAULT_QUERY_DOMAIN = google.com

# Target used specifically for root-level DNSSEC validation probes.
DNSSEC_ROOT_TARGET = .

[PHASES]
# --- PHASE SELECTION ---

# Phase 1: Validates server infrastructure, encryption (DoT/DoH), and exposure.
ENABLE_PHASE_SERVER = true

# Phase 2: Validates zone synchronization (SOA), transfers (AXFR), and CAA.
ENABLE_PHASE_ZONE = true

# Phase 3: Validates individual record consistency and semantic integrity.
ENABLE_PHASE_RECORD = true

[CONNECTIVITY]
# --- PERFORMANCE & SLA ---

# Enables ICMP Ping to check raw server availability and network RTT.
ENABLE_PING = true

# Number of ICMP packets to send per ping probe.
# Recommended: 3 to 10
PING_COUNT = 10

# Timeout for individual ICMP packets (seconds).
PING_TIMEOUT = 1

# Rounds of service probes (UDP/TCP/DoT/DoH) in Phase 1 to ensure stability.
PHASE1_PROBE_REPEATS = 2

# Rounds of SOA record fetches in Phase 2 to ensure data delivery stability.
PHASE2_PROBE_REPEATS = 2

# Latency (RTT) thresholds for warnings (YELLOW) in UI reports.
PING_LATENCY_WARN = 100
PING_LATENCY_CRIT = 500

# Packet Loss percentage thresholds for warnings/errors in UI reports.
PING_LOSS_WARN = 1
PING_LOSS_CRIT = 33

# Latency thresholds specifically for SOA record retrieval (Phase 2).
SOA_LATENCY_WARN = 100
SOA_LATENCY_CRIT = 500

[ADVANCED_CHECKS]
# --- CAPABILITIES AUDIT ---

# Attempts to query the software version (BIND/NSD/etc) via "version.bind" CH TXT.
CHECK_BIND_VERSION = true

# Checks if the server allows public recursion (Open Resolver exposure).
ENABLE_RECURSION_CHECK = true

# Validates if the server provides DNSSEC signed data for requests.
ENABLE_DNSSEC_CHECK = true

# Probes for EDNS0 support and Large UDP Packet capability.
ENABLE_EDNS_CHECK = true

# Checks for DNS-over-TLS (DoT) availability on port 853.
ENABLE_DOT_CHECK = true

# Checks for DNS-over-HTTPS (DoH) availability on port 443.
ENABLE_DOH_CHECK = true

# Checks for EDNS Client Subnet (ECS) support (Privacy implication).
ENABLE_ECS_CHECK = true

# Validates QNAME Minimization support for recursive queries.
ENABLE_QNAME_MIN_CHECK = true

# Probes for support of RFC 7873 DNS Cookies (DDoS protection).
ENABLE_DNS_COOKIES_CHECK = true

# INTERNAL - If true, performs full cryptographic validation of DNSSEC chains.
ENABLE_DNSSEC_CHAIN_VAL = false

[ZONE_TESTS]
# --- DATA INTEGRITY ---

# Attempts to perform a full Zone Transfer (Port 53 TCP).
ENABLE_AXFR_CHECK = true

# Audits SOA Refresh/Retry/Expire timers against RFC 1912 best practices.
ENABLE_SOA_TIMER_AUDIT = true

# Checks if individual domains are signed with DNSSEC (NSEC/NSEC3).
ENABLE_ZONE_DNSSEC_CHECK = true

# List of groups where AXFR is AUTHORIZED. AXFR success on other groups = Security Vulnerability.
# Recommended: Empty (for standard audits) or specific labels like SECONDARIES,INTERNAL
AXFR_ALLOWED_GROUPS = 

# Probes for generic web services (80/443) running on the DNS server (Risk of exposure).
ENABLE_WEB_RISK_CHECK = true

# Fetches and validates Certification Authority Authorization (CAA) records for the zone.
ENABLE_CAA_CHECK = true

[CONSISTENCY]
# --- RECORD ANALYSIS ---

# Number of times to repeat the same record query to detect divergent/unstable data.
# Recommended: 2 (fast) to 10 (thorough)
CONSISTENCY_CHECKS = 2

# Strictness: If true, IP address order changes between queries counts as Divergence (DIV!).
STRICT_IP_CHECK = false

# Strictness: If true, RDATA order changes counts as Divergence.
STRICT_ORDER_CHECK = false

# Strictness: If true, any change in record TTL between queries counts as Divergence.
STRICT_TTL_CHECK = false

# Record query latency thresholds (milliseconds) for Phase 3 reporting.
REC_LATENCY_WARN = 100
REC_LATENCY_CRIT = 500
